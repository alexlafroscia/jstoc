name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  readme-updated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: mise run jstoc
      - run: mise run format
      - uses: cbeck88/check-dirty-git@v1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: mise run -o keep-order test
