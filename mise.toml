[tasks.build]
description = "Compile TypeScript to JavaScript"
run = "pnpm exec tsc -p config/tsconfig.src.json"

[tasks.format]
description = "Format files"
run = "pnpm exec oxfmt"

[tasks.bin]
description = "Run the executable exposed by this package"
run = "node ./dist/bin.js"
depends = ["build"]

[tasks.test]
description = "Run all tests"
run = [{ task = "format", args = ["--check"] }, { task = "typecheck" }, { task = "test:unit" }]

[tasks."test:unit"]
description = "Run unit tests through Node"
run = "node --experimental-strip-types --test 'src/**/*.test.ts' 'test/**/*.test.ts'"

[tasks.typecheck]
description = "Run type-checking"
run = "pnpm exec tsc -p config/tsconfig.test.json"
depends = ["build"]

[tasks.changeset]
description = "Create a changeset to add to the changelog"
run = "pnpm exec changeset"

[tasks."changeset:version"]
description = "Apply pending changesets"
run = "pnpm exec changeset version"
depends_post = ["format"]
hide = true

[tasks."changeset:release"]
description = "Publish a release using `changesets`"
run = "pnpm exec changeset publish"
depends = ["build"]
hide = true

[tasks."husky:pre-commit"]
description = "Called by `husky` on pre-commit"
run = [
  { task = "bin" },
  "git add README.md",
  "pnpm exec lint-staged -c config/lint-staged.config.json",
]
hide = true

[deps.pnpm]
auto = true

[deps.husky]
auto = true
depends = ["pnpm"]
run = "pnpm exec husky"
outputs = [".husky/_"]

[tools]
node = "24.14.0"
pnpm = "11.10.0"
